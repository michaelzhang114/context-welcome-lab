name: Welcome First-Time Contributors

on:
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const author = context.payload.pull_request.user.login;

            // Search for all PRs by this author in this repository.
            // The current PR is already included in the search results.
            const { data } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:pr author:${author}`
            });

            console.log(`Found ${data.total_count} PR(s) from ${author}`);

            // If this is the only PR, it's their first.
            if (data.total_count === 1) {

              console.log("First-time contributor!");

              // Add a label
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ["first-time-contributor"]
              });

              // Leave a welcome comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `👋 Hey @${author}, welcome and thanks for your first contribution!

                We're excited to have you here.

                Please take a look at our Contributing Guide:
                https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md`
              });

            } else {
              console.log("Not a first-time contributor.");
            }
